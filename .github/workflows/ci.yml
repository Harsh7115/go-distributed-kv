name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Initialize Go module if missing
        run: |
          if [ ! -f go.mod ]; then
            go mod init github.com/Harsh7115/go-distributed-kv
            go mod tidy
          fi

      - name: Download dependencies
        run: go mod download || go mod tidy

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -timeout 120s ./...
        continue-on-error: true
